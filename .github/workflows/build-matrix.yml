name: Build matrix

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'Dockerfile.template'
      - 'versions/**'
      - '.github/workflows/build-matrix.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: ['2.4-small', '2.4-xl']
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.template
          build-args: QISKIT_VERSION=${{ matrix.version }}
          tags: ghcr.io/${{ steps.repo.outputs.owner_lc }}/qiskit:${{ matrix.version }}
          push: true
          cache-from: type=gha,scope=qiskit-${{ matrix.version }}
          cache-to: type=gha,scope=qiskit-${{ matrix.version }},mode=max

      - name: Sync stub branch for mybinder
        env:
          OWNER_LC: ${{ steps.repo.outputs.owner_lc }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan "$VERSION"
          git rm -rf --cached . >/dev/null
          find . -mindepth 1 -maxdepth 1 -not -name .git -exec rm -rf {} +
          mkdir -p binder
          printf 'FROM ghcr.io/%s/qiskit:%s\n' "$OWNER_LC" "$VERSION" > binder/Dockerfile
          git add binder/Dockerfile
          git commit -m "Sync stub branch for qiskit $VERSION"
          git push -f origin "$VERSION"
